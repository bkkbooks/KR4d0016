body:
  text: 元獻遺文别集類二宋提要臣等謹案元獻遺文一卷宋晏殊撰殊字同叔臨川人景德初以神童召試賜進士出身慶厯中拜集賢殿學士同平章事元獻其諡也事迹具宋史本傳東都事略稱有文集二百四十卷中興書目作九十四卷文獻通考載臨川集三十卷紫薇集一卷陳振孫云其五世孫大正為年譜一卷言先元獻嘗自差次起儒館至學士為臨川集三十卷起樞廷至宰席為二府集二十五卷云云今皆不傳此本為國朝康熙中慈溪胡亦堂所輯僅文六篇詩六首餘皆詩餘殊當北宋盛時日與諸名士文酒唱和其零章斷什往往散見諸書如復齋漫録古今嵗時雜詠侯鯖録西清詩話所載諸詩此本皆未收入未為完備然殊在北宋號曰能文雖二宋之作亦資其點定如能改齋漫録所記白雪久殘梁復道黃頭間守漢樓船者其推重可以想見原集既已無存則此裒輯之編僅存什一於千百者亦不能不録備一家矣乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:761520cff937dcf88648a55a5da5428686e1c0cb2398452cbc3e88a3f909b3e0
