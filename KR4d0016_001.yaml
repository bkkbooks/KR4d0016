body:
  text: 元獻遺文宋晏殊撰劄子天聖上殿劄子朝廷者天下之本也自古未有朝廷治而天下不治者亦未有朝廷不治而能治天下者故曰正朝廷以正百官正百官以正萬民正萬民以正四方此不易之序也太宗皇帝嘗以邊事問御史中丞王化基化基對以治天下猶植木所患根本未固固則枝幹不足憂今朝廷治則邊郡何患不安化基之言甚簡且要真知治本者也且人君無職事惟辨臣下之邪正實人君之職也然古今説者以辨邪正為難臣竊以為不然在人君用心何如耳使人君之心是非好惡每存乎私則邪正之辨實難人君之心是非好惡一循乎大公至正之道則邪正之辨何難之有唐明皇用姚崇宋璟則天下治方是時是非好惡無私意故也及用李林甫楊國忠馴至大亂此其心非不知林甫國忠之姦邪特便其能徇已之私爾書曰有言逆于汝心必求諸道有言遜于爾志必求諸非道為人君者能不忘乎此而邪正有不辨者臣不信也狀進兩制三館牡丹歌詩狀臣準傳宣劄子奉聖旨令兩制三館賦後苑諸殿亭牡丹歌詩者化合天人祥開卉木協風靈雨散為膏壤之滋共蒂并柯布在密青之圃畫品難形于卓異瑞圖不盡於芳妍乃詔儒臣各摛華藻匪太平之特異豈榮遇之及茲昔者虞舜膺期有臯陶之賡載周宣繼業聞吉甫之誦章蓋默助于謨猷不專工於辭翰逮於漢室尤好藝文别館離宫多命從臣之制作倡優鄭衛已無前古之針規中葉以還其風未泯永平神雀之頌孝明稱美者五人貞元重九之篇德宗考第於三等並垂編簡式著熙隆洪惟聖運之會昌可繼重華之輝耀然於衆製未復前修思諷諭者隱其誠而靡宣局聲律者艷其言而罕實不足以上裨睿覽下達民情效明良喜起之音續雅頌清微之範姑用登髙而能賦庶幾博奕之猶賢雖叶旁求豈任多愧臣首當庸濫實玷恩華興悟以思靦惶無極其兩制侍講學士龍圖閣待制自章得象已下十三人三館祕閣自康孝基已下二十七人歌詩共一百四十首謹隨狀進以聞記庭莎記余清思堂中宴亭之間隙地其縱十八步其橫南八步北十步以人迹之罕踐有莎生焉守護之卒皆疲癃者芟剃之役勞於後畦蓋是草耐水旱樂延蔓雖披心隕葉弗之絶也豫既悅草之蕃蕪而又憫卒之勤瘁思唐人賦咏間有種莎之説且茲地宛在崇堞車馬不至弦匏不設柔木嘉卉難於豐美非草也無所宜焉於是傍西墉盡修徑布武之外悉為莎場分命騶人散取增殖凡三日乃備援之以丹楯溉之以甘井風光四泛纎塵不驚嗟夫萬彚之多萬情之廣大含元氣細入無間罔不稟和相適區别顯仁措置有規生成有術失之則斁獲之則康茲一物也從可知矣乃今遂二性之域去兩傷之患偃藉吟諷無施不諧然而人所好尚世多同異平津客館尋為馬廏東漢學舍間充園蔬彼經濟所先而汚隆匪一矧茲近玩庸冀永年是用刊辭于石知所留意庶幾不剪也銘几銘小飯防饐跬行虞跌巾有角墊衣存袵缺惟忠與孝則罔摧折書答贊善兄家書十一哥贊善兄十一縣君尊嫂座前莊客至知大事禮畢日月迅速哀痛無極奈何奈何志文本及寄殊生日衣服及孩兒妳妳等信物柑子黃雀鮓等領訖地逺不須煩神况人事有何窮極置得宅子大抵亷白守分為官須作一生計且安泊親屬不必待豐足嘗見范應辰率家人持十齋自云一以勸其淡素好善次則減魚肉之價聚為生計果置得一兩好莊及第宅免於茫然此最良圖况宦遊何窮期兼官下不得營私魏四工部為戒也然須內外各宜儉約為先方可議此殊家間僕吏等直至今兩日內破一頓豬肉定其兩數或回換買魚肉亦只約豬肉錢數此持久之術是以常為宗親及相知交遊言之建節之説皆虛傳也今邊事尚未息須當重委建節必不優間處用此職况須因干求經營方受殊一生不曽干求况今雖位極人臣何顔求覔是以須待出於特命且不能效人干請結托勢雖恬靜若非久特差則逺近髙下應當推避必不可求請凡虛傳者但請勿信古今賢哲有識見知恥者量力度德憂不能任不佞當負愧畏重責是以終無幸求其更識髙者非親耕不食非親蠶不衣孺子之類是也蓋功利不能及人而坐受竊其膏血縱無禍須愧赧也殊來多介僻者理在此今因信略及之答中丞兄家書殊再拜三哥廷評三嫂座前領手書深喜王事外萬福安寧此中婆婆新婦等如常寄物甚多倍煩神明骨肉不必如此四郎思晦下面三孩兒貽矩宗願知已取在彼知令讀書否假如性不髙亦令讀書學詩學禮宜親老宿有德之人所冀向後自了得一身免辱門户也此最日夕急切事二十七寧殿直二年大段聽人言語謹卓不曽出入兼識好慈善得力免勞人心力亦應是從有家纍知惜身事兄弟且免一件憂煎因信上聞希令諸子知之若能稍學好事免為人所嗤笑成立得身父母一生放心有望矣門前不要令小後生輕薄不著實者來往或尋得一有年年甲嚴謹門客教訓諸子甚好先少師所以常孜孜於此事重念余白饒鼎朴實嫌其餘輕薄殊日思量方知是格言也近日京師官中行公事甚多細視多是人家子弟輕事玩狎非類致之者是知小兒女尤宜親近有德逺輕薄之徒也二娘子已商量與應茂才異等秀才富弼為親極有行止文萟三郎一面為問覔新婦婚姻事逼日日嬰心也五言古詩列子有力命王充有命祿極言必定之致覽之有感大鈞播羣物零茂歸自然理定既有初不為智力遷禦寇導其流仲任派其源智愚信自我通塞當由天吾道誠一槩彼途有百端卷之入纎毫舒之盈八埏進退得其宜夸榮非所先朝聞可夕隕吾奉先師言和王校勘中夏東園東園何所樂所樂亦多事野竹亂無行幽花晚多思間看魚尾漪暗辨蜂腰細樹影密遮林藤梢狂罥袂潘蔬足登膳陶秫徑取醉幸獲我汝交可忘今昔世歡言捧瑶佩願以疏麻繼七言律初秋宿直絳河星斗夜闌干禁署沈沈閉九關上帝册書羣玉府仙人宫闕巨鼇山涼隂影度秋心薄促漏聲來夜唱間隱几吟多欲愁絶嚴鐘淒斷樹烏還安昌侯蓮勺移家近七遷魯儒章句世相傳關中沃壤通涇渭堂上繁聲逐管絃身服儒衣同蔡義日將巵酒對彭宣髙墳丈五陽陵外千古朱雲氣凜然無題油壁香車不再逢峽雲無迹任西東梨花院落溶溶月栁絮池塘淡淡風幾日寂寥傷酒後一畨蕭瑟禁煙中魚書欲寄何由達水逺山長處處同憶臨川舊遊仲子幽居杳藹間回環十畝盡林巒遊魚倒泝清泉急乳雉驚飛夕燒乾繫馬短亭乘草茁攜壺芳榭值梅酸浮生莫道今如昨曷月朋簪急此歡詩餘浣溪沙閬苑瑶臺風露秋整鬟凝思捧觥籌欲歸臨别強遲留月落漫成孤枕夢酒闌空得兩眉愁此時情緒悔風流又三月和風滿上林牡丹妖艷值千金惱人天氣又春隂為我轉回紅粉面向誰分付紫檀心有情須殢酒杯深又青杏園林煮酒香佳人初著薄羅裳栁絲無力燕飛忙乍雨乍晴花自落間愁間悶日偏長為誰消瘦減容光又一曲新詞酒一杯去年天氣舊亭臺夕陽西下幾時回無可奈何花落去似曽相識燕歸來小園香徑獨徘徊又宿酒才醒厭玉巵水沈香冷懶薰衣早梅先綻日邊枝寒雪寂寥初散日春風悠揚欲來時小屏間放畫簾垂又已是年光有限身等間離别更銷魂酒筵歌席莫辭頻滿目山河空念逺落花風雨更傷春不如憐取眼前人更漏子寒雁髙濃露滿秋入銀河清淺逢佳客且開眉盛年能幾時寶箏調羅袖軟拍碎畫堂檀板須盡醉莫推辭人生足别離鵲踏枝檻菊愁煙蘭泣露羅幕輕寒燕子雙飛去明月不諳離別苦斜光到曉穿朱户昨夜西風雕碧樹獨上髙樓望盡天涯路欲寄彩鸞無尺素山長水濶知何處鳳銜杯留花不住怨花飛向南園情緒依依可惜倒紅斜白一枝枝經宿雨又離披憑朱檻把金巵對芳叢惆悵多時何况舊歡新恨阻心期滿眼是相思清平樂春花秋草只是催人老總把千山眉黛掃未抵别愁多少勸君緑酒金杯莫嫌絲管聲催兔走烏飛不住人生幾度樓臺又秋光向晚小閣初開宴林葉殷紅猶未遍雨後青苔滿院蕭娘勸我金巵殷勤更唱新詞暮去朝來老盡人生不飲何為又春來秋去往事知何處燕子歸飛蘭泣露光景千留不住酒闌人散忡忡間階獨倚梧桐記得去年今日依前黃葉西風紅窗聽記得香閨臨别語彼此有萬重心訴淡雲輕靄知多少隔桃源無處夢覺相思天欲曙依前是銀屏畫燭宵長嵗暮此時何寄託鴛鴦飛去撼庭秋别來音信千里恨此情難寄碧紗秋月梧桐夜雨夢回無寐樓髙目斷天邊雲黯只堪憔悴念蘭堂紅燭心長焰短向人垂淚少年遊芙蓉花發去年枝雙燕欲歸飛蘭堂風軟金爐香暖新曲動簾帷家人拜上千秋壽深意滿瓊巵緑鬢朱顔道家粧束長似少年時木蘭花東風昨夜回梁苑日腳依稀添一線旋開楊桞緑蛾眉暗折海棠紅粉面無情一去雲中雁有意歸來梁上燕有情無意且休論莫向酒杯容易散又池塘水緑風微暖記得玉真初見面重頭歌韻響琤琮入破舞腰紅亂旋玉鉤闌下香階畔醉後不知斜日晚當時共我賞花人點檢如今無一半又朱簾半下香銷印二月東風催栁信琵琶旁畔且尋思鸚鵡前頭休借問驚鴻去後生離恨紅日長時添酒困未知心在阿誰邊滿眼淚珠流不盡殢人嬌二月春風正是桃花滿路那堪更别離情緒羅巾掩淚任粉痕霑汚爭奈何千留萬留不住玉酒頻傾翠眉愁聚空腸斷寶箏絃柱人間後會又不知何處魂夢裡也須時時飛去踏莎行細草愁煙幽花怯露憑欄總是銷魂處日髙深院靜無人時時海燕雙飛去帶緩羅衣香殘蕙炷天長不禁思迢遞垂楊只解惹春風何曽繫得行人住又祖席離歌長亭别宴香塵已隔猶回面居人匹馬映林嘶行人去棹依波轉畫閣魂銷髙樓目斷斜陽只送平波逺無窮無盡是離愁天涯地角尋思遍又碧海無波瑶臺有路思量便合雙飛去當時輕别意中人山長水逺知何處綺席凝塵香閨掩霧紅箋小字憑誰附髙樓目盡欲黃昏梧桐葉上蕭蕭雨又小徑紅稀芳郊緑遍髙臺樹色隂隂見春風不解禁楊花濛濛亂撲行人面翠葉藏鶯朱簾隔燕爐香靜逐遊絲轉一場愁夢酒醒時斜陽却照深深院漁家傲宿蕊攢攢金粉閙青房暗結蜂兒小斂却似啼開似笑天與貌人間不是鉛華少華軟香清無限好風頭日腳乾催老待得玉京仙子到憑向道紅顔只合長年少又越女採蓮江北岸輕橈短棹隨風便人貌與花相鬭間流水慢時時照影看粧面蓮葉層層張緑繖蓮房箇箇垂金盞一把藕絲牽不斷紅日晚回頭欲去心撩亂玉樓春緑楊芳草長亭路年少拋人容易去樓頭殘夢五更鐘花底離情三月雨無情不似多情苦一寸還成千萬縷天涯地角有窮時只有相思無盡處阮郎歸南園春半踏青時風和聞馬嘶青梅如豆栁如眉日長蝴蝶飛花露重草煙低人家簾幕垂鞦韆慵困解羅衣畫梁雙燕歸蝶戀花簾幕風輕雙語燕午醉醒來栁絮飛撩亂心事一春猶未見餘花落盡青苔院百尺朱樓間倚遍薄雨濃雲抵死遮人面消息未知歸早晚斜陽只送平波逺又六曲欄干偎碧樹楊栁風輕展盡黃金縷誰抱鈿箏移玉柱穿簾海燕雙飛去滿眼遊絲兼落絮紅杏開時一霎清明雨濃睡覺來人不語驚殘好夢無尋處臨江仙鬭草階前初見穿針樓上曽逢羅裙香露玉叉風靚粧眉沁緑羞態粉生紅流水便隨春逺行雲終與誰同酒醒長恨錦屏空相尋夢裏路飛雨落花中又淺淺餘寒春半雪消蕙草初長煙迷栁岸舊池塘風吹梅蕊閙雨細杏花香月墮窗前有意從前虛夢髙唐覺來何處放思量如今不是夢真個到伊行蝶戀花卷絮風頭寒欲盡墜粉飄紅日日香成陳新酒又添宿酒困今春不減前春恨蝶去鶯飛無處問隔水髙樓望斷雙魚信惱亂層波橫一寸斜陽只與黃昏近又醉到西樓醒不記春夢秋雲聚散真容易斜月半窗還少睡畫屏間展吳山翠衣上酒痕詩裏字點點行行總是淒涼意紅燭自憐無好計夜寒空替人垂淚又欲減羅衣寒未去不捲珠簾人在深深處紅杏枝頭花幾許啼紅正恨清明雨盡日沈香煙一縷宿酒醒遲惱破春情緒寄信還因歸燕誤小屏風上西江路鷓鴣天彩袖殷勤捧玉鍾當年􅍆却醉顔紅舞低楊栁樓頭月歌罷桃花扇底風從别後憶相逢幾回魂夢與君同今宵剩把銀釭照猶恐相逢是夢中又鬭鴨池南夜不歸酒闌紈扇有新詩雲隨碧玉歌聲轉雪繞紅裙舞袖回今感舊欲沾衣可憐人似水東西回頭滿眼淒涼事秋月春風豈得知又陌上濛濛殘絮飛杜鵑花裏杜鵑啼年年底事不歸去怨日愁煙長為誰梅雨細曉風微倚樓人聽欲沾衣故園三度羣花謝何事天涯猶未歸生查子金鞭美少年去躍青驄馬牽繫玉樓人繡被春寒夜消息未歸來寒食梨花謝無處説相思背面秋千下南鄉子緑水帶春潮水上朱欄小度橋橋上女兒雙笑靨妖嬈倚著欄杆弄栁條月夜與花朝減字偷聲按玉簫栁外行人回首處飄蕭若比銀河路更遙清平樂留人不住醉解蘭舟去一棹碧濤春水路過盡曉鶯啼處渡頭楊栁青青枝枝葉葉離情此後錦書休寄畫樓雲雨無憑又西池煙罩何處尋芳草滿路落花紅不掃春色漸隨人老逺山眉黛嬌長清歌細逐霞觴正好十洲殘夢水心宫殿斜陽又暫來還去輕似風中絮縱得相逢留不住何况相逢無處去時約略黃昏月華却到朱門别後幾畨明月素娥應是消魂木蘭花鞦韆院落重簾暮寂寞春間扃繡户牆頭紅杏雨餘花門外緑楊風後絮朝雲信斷知何處應作襄王春夢去紫騮認得舊遊蹤嘶過畫橋東畔路菩薩蠻哀箏一弄湘江曲聲聲寫盡湘波緑纎指十三絃細將幽恨傳當筵秋水漫玉柱斜飛雁彈到斷腸時春山眉黛低玉樓春一尊相遇春風裏詩好似君能有幾吳姬十五語如絃能唱當時樓下水良辰易去如彈指金盞十分須盡意明朝三丈日髙時共拚扶頭醉不起阮郎歸殘香剩粉似當初人情恨不如一春猶有數行書秋來書更疏衾下冷枕中孤愁腸待酒舒夢魂縱有也成虛那堪和夢無虞美人飛花自有牽情處不向枝邊舞隨風飄蕩已堪愁更伴東流流水過秦樓樓中翠黛含春怨間倚闌干見逺彈雙淚惜香紅暗恨玉顔光景與花同又曲闌干外天如水昨夜還曽倚初將明月比佳期長向月圓時候望人歸羅衣著破前香在舊意誰教改一春離恨懶調絃猶有兩行間淚寶箏前踏莎行雪盡寒輕月斜煙重清歡猶記前時共迎風朱户背燈開拂簾花影侵簾動繡枕雙鴛香苞翠鳳從來往事都如夢傷心最是醉歸時眼前少個人人送御街行霜風漸緊寒侵被聽孤雁聲嘹唳一聲聲送一聲悲雲淡碧天如水披衣告雁兒略住聽我些兒事塔兒南畔城兒裏第三個橋兒外瀕河西岸小紅樓門外梧桐雕砌請教且與低聲飛過那裏有人人無寐六么令日髙春睡喚起懶裝束年年落花時候慣得嬌嗔足學唱宫梅便好更暖銀笙逐黛蛾低緑堪教人恨却似江南舊時曲常記東樓夜雪翠幕遮紅燭還是芳酒杯中一醉光隂促可惜陽臺夢杳無計憐香玉此歡難續乞求歌罷借取歸雲畫堂宿元獻遺文
